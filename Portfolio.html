<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio - Sarfraz Ali</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0d0d0d;
      color: #fff;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
      padding: 20px 0;
    }

    /* --- Navigation --- */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
    }

    .logo img {
      height: 55px; 
      width: 55px; 
      object-fit: cover; 
      border-radius: 50%; 
      border: 2px solid orange; 
      box-shadow: 0 0 10px rgba(255, 165, 0, 0.3); 
      display: block;
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .logo img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(255, 165, 0, 0.8);
      border-color: #fff;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 30px;
    }

    nav ul li {
      color: #aaa;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    nav ul li:hover, nav ul li.active {
      color: orange;
    }

    /* --- Hero Section --- */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      min-height: 80vh;
    }

    .hero-text {
      flex: 1;
      min-width: 300px;
    }

    .hero-text p {
      font-size: 18px;
      color: #ccc;
    }

    .hero-text h3 {
      font-size: 28px;
      font-weight: 600;
      margin: 5px 0;
    }

    .hero-text h1 {
      font-size: 55px; 
      font-weight: 800;
      color: orange;
      line-height: 1.1;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 40px;
    }

    .btn {
      background: orange;
      border: none;
      padding: 12px 30px;
      color: #000;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.4s;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #555;
      color: #fff;
      padding: 12px 30px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.4s;
    }

    .btn:hover, .btn-outline:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(255, 165, 0, 0.4);
    }

    .stats {
      display: flex;
      gap: 40px;
      background: rgba(26, 26, 26, 0.8);
      padding: 20px 30px;
      border-radius: 15px;
      width: fit-content;
    }

    .stat h3 { color: orange; font-size: 22px; }
    .stat p { color: #888; font-size: 13px; }

    .hero-img-container {
      position: relative;
      width: 500px;
      height: 500px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      cursor: pointer;
    }

    .bg-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      background: #161616;
      border-radius: 50%;
      bottom: 20px;
      z-index: 1;
      box-shadow: 0 0 30px rgba(255, 165, 0, 0.2);
      transition: 0.5s ease;
    }

    .hero-img-container:hover .bg-circle {
      box-shadow: 0 0 70px rgba(255, 165, 0, 0.6);
      background: #1a1a1a;
    }

    .img-clipper {
      position: absolute;
      width: 400px;
      height: 550px;
      bottom: 20px;
      z-index: 2;
      overflow: hidden;
      border-bottom-left-radius: 200px; 
      border-bottom-right-radius: 200px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    .img-clipper img {
      width: 380px;
      height: auto;
      display: block;
      transition: 0.5s ease;
    }

    .hero-img-container:hover img {
      transform: scale(1.03);
    }

    /* --- Footer Section --- */
    .footer-section {
      text-align: center;
      padding: 100px 0 40px;
      background: #000;
    }

    .footer-socials {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 30px;
    }

    .footer-socials a {
      color: #fff;
      font-size: 24px;
      background: #1a1a1a;
      width: 55px;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: 0.4s;
      border: 1px solid #333;
      text-decoration: none; /* UNDERLINE REMOVED HERE */
    }

    .footer-socials a:hover {
      background: orange;
      color: #000;
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(255, 165, 0, 0.5);
    }

    .copyright {
      color: #666;
      font-size: 14px;
      margin-top: 20px;
    }

  </style>
</head>
<body>

<div class="container">
  <nav>
    <div class="logo">
      <img src="MY Logo.jpeg" alt="Sarfraz Logo">
    </div>
    <ul>
      <li class="active">Home</li>
      <li>Services</li>
      <li>About</li>
      <li>Portfolio</li>
      <li>Contact</li>
    </ul>
    <button class="btn">Hire Me</button>
  </nav>

  <div class="hero">
    <div class="hero-text">
      <p>Hi I am</p>
      <h3>Sarfraz Ali</h3>
      <h1>WEB/APP Designer</h1>
      <div class="buttons">
        <button class="btn">Hire Me</button>
        <button class="btn-outline">Download CV</button>
      </div>
      <div class="stats">
        <div class="stat"><h3>5+</h3><p>Experiences</p></div>
        <div class="stat"><h3>20+</h3><p>Project done</p></div>
        <div class="stat"><h3>80+</h3><p>Happy Clients</p></div>
      </div>
    </div>
    <div class="hero-img-container">
      <div class="bg-circle"></div>
      <div class="img-clipper">
        <img src="MY pic.png" alt="Sarfraz Ali">
      </div>
    </div>
  </div>
</div>

<footer class="footer-section">
  <div class="footer-socials">
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/its.meersarfraz03" target="_blank"><i class="fab fa-facebook-f"></i></a>
    <a href="https://wa.me/923113934521" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="#"><i class="fab fa-linkedin-in"></i></a>
  </div>
  <p class="copyright">© 2026 Sarfraz Ali. All rights reserved.</p>
</footer>

</body>
</html>
